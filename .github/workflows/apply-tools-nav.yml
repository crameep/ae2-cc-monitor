name: Apply Tools navigation

on:
  push:
    branches:
      - feature/tools-nav

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/tools-nav
      - name: Apply patch and validate
        run: |
          python3 .github/apply_tools_nav.py
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.2
          luac5.2 -p startup.lua
      - name: Commit result
        run: |
          rm .github/apply_tools_nav.py
          rm .github/workflows/apply-tools-nav.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add startup.lua README.md .github
          git commit -m "Add Tools page and one-touch diagnostic upload"
          git push origin HEAD:feature/tools-nav
