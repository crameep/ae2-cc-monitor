name: Apply stock readability fix

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply migration
        run: python3 .github/fix_stock_readability.py

      - name: Install Lua 5.2
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.2

      - name: Validate Lua
        run: luac5.2 -p startup.lua

      - name: Remove one-time migration files
        run: |
          rm -f .github/fix_stock_readability.py
          rm -f .github/workflows/fix-stock-readability.yml

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add startup.lua README.md .github
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Improve stock watch readability and filtering"
          git push
