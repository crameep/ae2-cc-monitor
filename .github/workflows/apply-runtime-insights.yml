name: Apply runtime insights

on:
  push:
    branches: [main]
    paths:
      - '.github/apply_runtime_insights.py'
      - '.github/workflows/apply-runtime-insights.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply bridge-specific improvements
        run: python .github/apply_runtime_insights.py
      - name: Validate Lua 5.2 syntax
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.2
          luac5.2 -p startup.lua
      - name: Commit final update and remove migration files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add startup.lua README.md
          git rm .github/apply_runtime_insights.py .github/workflows/apply-runtime-insights.yml
          git commit -m "Use bridge-aware crafting estimates and system metrics"
          git push
